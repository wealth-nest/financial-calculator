    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a mutual fund?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A mutual fund pools money from many investors and invests it in stocks, bonds, or other securities. It is managed by a professional fund manager. You own units of the fund proportional to your investment. Mutual funds are regulated by SEBI in India."
          }
        },
        {
          "@type": "Question",
          "name": "What is SIP (Systematic Investment Plan)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SIP is a way to invest a fixed amount regularly (usually monthly) in a mutual fund. It helps you build wealth through discipline, benefit from rupee cost averaging, and harness the power of compounding over time. You can start SIP with as little as Rs 500 per month."
          }
        },
        {
          "@type": "Question",
          "name": "What is the minimum amount to start investing in mutual funds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most mutual funds allow SIP investments starting from Rs 500 per month. Lumpsum investments typically start from Rs 1,000 to Rs 5,000 depending on the fund house. There is no maximum limit for investment."
          }
        },
        {
          "@type": "Question",
          "name": "How are mutual fund returns taxed in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For equity funds: Short-term gains (held less than 1 year) are taxed at 15%. Long-term gains exceeding Rs 1 lakh per year are taxed at 10%. For debt funds: All gains are taxed at your income tax slab rate regardless of holding period. Dividend income is added to your total income and taxed at your slab rate."
          }
        },
        {
          "@type": "Question",
          "name": "What is ELSS and how does it save tax?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ELSS (Equity Linked Savings Scheme) is a type of equity mutual fund that qualifies for tax deduction under Section 80C of the Income Tax Act. You can claim deduction up to Rs 1.5 lakh per year. ELSS has the shortest lock-in period of 3 years among all 80C instruments."
          }
        },
        {
          "@type": "Question",
          "name": "What returns can I expect from mutual funds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Historical average returns: Equity funds 12-15% per annum over long term (10+ years), Hybrid funds 8-12%, Debt funds 6-8%, Liquid funds 5-7%. These are averages and actual returns vary year to year. Past performance does not guarantee future results."
          }
        },
        {
          "@type": "Question",
          "name": "Can NRIs invest in mutual funds in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, NRIs can invest in Indian mutual funds through their NRE or NRO bank accounts. Some fund houses have restrictions for US/Canada-based NRIs due to FATCA compliance. KYC with overseas address proof is required."
          }
        },
        {
          "@type": "Question",
          "name": "How do I start investing through Nandalal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Fill the consultation form on our home page or contact us via WhatsApp. Nandalal will understand your goals, assess your risk profile, and recommend suitable mutual funds. You can also use our free tools like SIP Calculator, Risk Profiler, Goal Planner, and Fund Explorer."
          }
        }
      ]
    }
    </script>
